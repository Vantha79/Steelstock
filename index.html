<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Plan Zoning</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
  }

  .container {
    display: flex;
    gap: 20px;
  }

  .zone {
    border: 2px solid black;
    padding: 10px;
    background: white;
  }

  .title {
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
  }

  .box {
    border: 1px solid black;
    padding: 10px;
    margin: 5px 0;
    text-align: center;
  }

  .vertical {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    height: 150px;
  }

  .small {
    height: 40px;
  }

  .left, .right {
    width: 50%;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
  }
</style>
</head>

<body>

<div class="container">

  <!-- ZB -->
  <div class="zone left">
    <div class="title">Z.B</div>

    <div class="box">BATIMENT PRS</div>

    <div style="display:flex; gap:10px;">
      <div class="box vertical">PORTE A</div>
      <div class="box vertical">PORTE B</div>
    </div>

    <div class="box">
      <div class="grid">
        <div class="box small">ZEC1</div>
        <div class="box small">ZEC2</div>
        <div class="box small">ZEC3</div>
        <div class="box small">ZEC4</div>
        <div class="box small">ZEC5</div>
        <div class="box small">ZEC6</div>
        <div class="box small">ZEC7</div>
        <div class="box small">ZEC8</div>
        <div class="box small">ZEC9</div>
        <div class="box small">ZEC10</div>
      </div>
    </div>

    <div class="box">RACK PEINTURE</div>
  </div>

  <!-- ZA -->
  <div class="zone right">
    <div class="title">Z.A</div>

    <div class="box">BUREAUX</div>

    <div class="box">HALL 4</div>
    <div class="box">HALL 5</div>
    <div class="box">HALL 6</div>
    <div class="box">HALL 7</div>
    <div class="box">HALL 8</div>

    <div class="box">Z.F</div>

    <div class="box">
      <div>BUREAUX (Z1 → Z9)</div>
    </div>
  </div>

</div>

</body>
</html>
